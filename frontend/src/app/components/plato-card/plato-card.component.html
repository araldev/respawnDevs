@if (plato()) {
  <div class="plato-card">
    <div class="plato-image">
      <img src="https://via.placeholder.com/300x200" alt="Imagen del plato">
      @if (plato()?.id === 1) {
        <span class="recomendado">Recomendado</span>
      }
    </div>
    <div class="plato-info">
      <div class="rating">
        <span>★★★★★</span>
        <span class="rating-score">4.8 (124)</span>
      </div>
      <h2>{{ plato()?.nombre }}</h2>
      <p>{{ plato()?.descripcion }}</p>
      <app-alergenos [alergenos]="plato()?.alergenos || []"></app-alergenos>
      <div class="footer">
        <span class="precio">{{ plato()?.precio }}€</span>
        <button class="add-to-cart">
          <span class="cart-icon"></span>
          Añadir al carrito
        </button>
      </div>
    </div>
  </div>
}
